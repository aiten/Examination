<nav class="menu">
  <div class="developer-status"><strong>Keycloak Events:</strong> {{ keycloakStatus }}</div>

  <div class="actions">

    <a routerLink="/" class="action-item">Home</a>

    <a routerLink="/exams" class="action-item" *kaHasRoles="[roles.user]">Exams</a>
    <a routerLink="/profile" class="action-item" *kaHasRoles="[roles.viewProfile]">Profile</a>

    <div class="dropdown" *kaHasRoles="[roles.admin]">
      <span class="action-item dropdown-toggle">Admin</span>
      <div class="dropdown-menu">
        <a routerLink="/teachers" class="action-item">Teachers</a>
        <a routerLink="/classes" class="action-item">Classes</a>
        <a routerLink="/subjects" class="action-item">Subjects</a>
        <a routerLink="/courses" class="action-item">Courses</a>
        <a routerLink="/students" class="action-item">Students</a>
      </div>
    </div>

    @if (this.keycloak.hasResourceRole(roles.viewProfile) || this.keycloak.hasRealmRole(roles.viewProfile)) {
    <a routerLink="/profile" class="action-item">My Profile</a>
    }
    @if (!authenticated) {
    <button class="action-item" (click)="login()">Login</button>
    } @else {
    <button class="action-item" (click)="logout()">Logout</button>
    }
  </div>
</nav>
